name: CI

# Gate every PR (and pushes to main) on a green typecheck + test.
# This is the check that, once required in branch protection, blocks a PR like
# the bookmarks one that broke main's backend build from being merged.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm typecheck

      - name: Test (all packages)
        run: pnpm test

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: apps/flutter_mobile
        run: flutter pub get

      - name: Analyze Flutter app
        working-directory: apps/flutter_mobile
        run: flutter analyze

      - name: Test Flutter app
        working-directory: apps/flutter_mobile
        run: flutter test
